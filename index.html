<!doctype html>
<html lang="en">
  <head>
    <script>
      if (typeof GPUAdapter !== 'undefined' && GPUAdapter.prototype.requestDevice) {
        const originalRequestDevice = GPUAdapter.prototype.requestDevice;
        GPUAdapter.prototype.requestDevice = function(descriptor) {
          if (descriptor && descriptor.requiredLimits) {
            delete descriptor.requiredLimits.maxInterStageShaderComponents;
            delete descriptor.requiredLimits.maxInterStageShaderVariables;
            delete descriptor.requiredLimits.maxColorAttachmentBytesPerSample;
          }
          return originalRequestDevice.call(this, descriptor);
        };
      }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <title>Gravity Edge Bundling Visualizer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
